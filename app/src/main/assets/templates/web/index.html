<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Web 工作空间</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            max-width: 800px;
            width: 100%;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            text-align: center;
        }
        
        h1 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 2.5rem;
        }
        
        p {
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1rem;
        }
        
        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 40px;
        }
        
        .feature {
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
            transition: transform 0.3s ease;
        }
        
        .feature:hover {
            transform: translateY(-5px);
        }
        
        .feature h3 {
            color: #667eea;
            margin-bottom: 10px;
        }
        
        .tip {
            background-color: #e8eaf6;
            border-left: 4px solid #667eea;
            padding: 15px 20px;
            margin: 30px 0;
            border-radius: 4px;
            text-align: left;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 欢迎来到 Apex</h1>
        <p>这是您的 Web 项目工作空间，开始创建精彩的网页吧！</p>
        
        <div class="tip">
            <strong>💡 提示：</strong> 您可以直接编辑这个 HTML 文件，或者创建新的 HTML、CSS 和 JavaScript 文件。所有更改都会实时反映在预览中。
        </div>
        
        <div class="features">
            <div class="feature">
                <h3>📝 编辑文件</h3>
                <p>在工作区中打开和编辑文件</p>
            </div>
            <div class="feature">
                <h3>👀 实时预览</h3>
                <p>保存后立即查看效果</p>
            </div>
            <div class="feature">
                <h3>🎨 现代化</h3>
                <p>支持最新的 Web 技术</p>
            </div>
        </div>
    </div>
    
    <script>
        console.log('✨ Apex Web 工作空间已就绪！');
    </script>
</body>
</html>
