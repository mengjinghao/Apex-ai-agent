<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>技能详情</title>
    <style>
        :root {
            --bg-primary: #0a0e17;
            --bg-secondary: #111827;
            --bg-glass: rgba(17, 24, 39, 0.7);
            --border-glass: rgba(99, 102, 241, 0.2);
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
            --text-muted: #6b7280;
            --accent-primary: #6366f1;
            --accent-secondary: #8b5cf6;
            --accent-cyan: #06b6d4;
            --accent-neon: #39ff14;
            --accent-pink: #ec4899;
            --accent-amber: #f59e0b;
            --shadow-glow: 0 0 20px rgba(99, 102, 241, 0.3);
            --blur: blur(12px);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .background-grid {
            position: fixed;
            inset: 0;
            background: 
                linear-gradient(90deg, rgba(99, 102, 241, 0.03) 1px, transparent 1px),
                linear-gradient(rgba(99, 102, 241, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border-glass);
        }

        .back-btn {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: var(--bg-glass);
            border: 1px solid var(--border-glass);
            color: var(--text-primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            backdrop-filter: var(--blur);
        }

        .back-btn:hover {
            background: var(--accent-primary);
            border-color: var(--accent-primary);
            box-shadow: var(--shadow-glow);
        }

        .header-content {
            flex: 1;
        }

        .skill-title {
            font-size: 1.5rem;
            font-weight: 600;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .skill-category {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .glass-card {
            background: var(--bg-glass);
            border: 1px solid var(--border-glass);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            backdrop-filter: var(--blur);
            transition: all 0.3s ease;
        }

        .glass-card:hover {
            border-color: rgba(99, 102, 241, 0.4);
            box-shadow: 0 8px 32px rgba(99, 102, 241, 0.15);
        }

        .section-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title::before {
            content: '';
            width: 4px;
            height: 16px;
            background: linear-gradient(180deg, var(--accent-primary), var(--accent-secondary));
            border-radius: 2px;
        }

        .description {
            color: var(--text-secondary);
            line-height: 1.7;
            font-size: 0.95rem;
        }

        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .tag {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
            background: rgba(99, 102, 241, 0.15);
            border: 1px solid rgba(99, 102, 241, 0.3);
            color: var(--accent-primary);
            transition: all 0.3s ease;
        }

        .tag:hover {
            background: rgba(99, 102, 241, 0.25);
            box-shadow: 0 0 10px rgba(99, 102, 241, 0.3);
        }

        .tag.cyan {
            background: rgba(6, 182, 212, 0.15);
            border-color: rgba(6, 182, 212, 0.3);
            color: var(--accent-cyan);
        }

        .tag.pink {
            background: rgba(236, 72, 153, 0.15);
            border-color: rgba(236, 72, 153, 0.3);
            color: var(--accent-pink);
        }

        .tag.amber {
            background: rgba(245, 158, 11, 0.15);
            border-color: rgba(245, 158, 11, 0.3);
            color: var(--accent-amber);
        }

        .tag.green {
            background: rgba(57, 255, 20, 0.15);
            border-color: rgba(57, 255, 20, 0.3);
            color: var(--accent-neon);
        }

        .param-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .param-item {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            border: 1px solid rgba(99, 102, 241, 0.1);
        }

        .param-name {
            font-weight: 600;
            color: var(--accent-cyan);
            font-family: 'JetBrains Mono', 'Consolas', monospace;
            font-size: 0.9rem;
        }

        .param-type {
            font-size: 0.75rem;
            color: var(--accent-pink);
            padding: 2px 8px;
            background: rgba(236, 72, 153, 0.1);
            border-radius: 4px;
            margin-left: 8px;
        }

        .param-required {
            font-size: 0.7rem;
            color: var(--accent-neon);
            padding: 2px 6px;
            background: rgba(57, 255, 20, 0.1);
            border-radius: 4px;
            margin-left: 8px;
        }

        .param-desc {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-top: 4px;
        }

        .action-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 16px 20px;
            background: var(--bg-glass);
            border-top: 1px solid var(--border-glass);
            backdrop-filter: var(--blur);
            display: flex;
            gap: 12px;
            z-index: 100;
        }

        .btn {
            flex: 1;
            padding: 14px 24px;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: white;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.5);
        }

        .btn-secondary {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border-glass);
        }

        .btn-secondary:hover {
            border-color: var(--accent-primary);
            box-shadow: var(--shadow-glow);
        }

        .usage-history {
            max-height: 300px;
            overflow-y: auto;
        }

        .usage-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            margin-bottom: 8px;
            border: 1px solid rgba(99, 102, 241, 0.1);
        }

        .usage-time {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .usage-status {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .usage-status.success {
            background: rgba(57, 255, 20, 0.15);
            color: var(--accent-neon);
        }

        .usage-status.failed {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .stat-item {
            padding: 16px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            text-align: center;
            border: 1px solid rgba(99, 102, 241, 0.1);
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 200px;
            color: var(--text-muted);
        }

        .loading::after {
            content: '';
            width: 24px;
            height: 24px;
            border: 2px solid var(--accent-primary);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 12px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
        }

        .empty-icon {
            font-size: 3rem;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .scrollbar::-webkit-scrollbar {
            width: 6px;
        }

        .scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .scrollbar::-webkit-scrollbar-thumb {
            background: var(--border-glass);
            border-radius: 3px;
        }

        .scrollbar::-webkit-scrollbar-thumb:hover {
            background: var(--accent-primary);
        }

        @media (max-width: 600px) {
            .container {
                padding: 16px;
                padding-bottom: 100px;
            }

            .header {
                gap: 12px;
            }

            .skill-title {
                font-size: 1.25rem;
            }

            .glass-card {
                padding: 16px;
            }

            .stats-grid {
                grid-template-columns: 1fr 1fr;
                gap: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="background-grid"></div>
    
    <div class="container scrollbar">
        <header class="header">
            <button class="back-btn" onclick="goBack()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
            </button>
            <div class="header-content">
                <h1 class="skill-title" id="skillName">加载中...</h1>
                <p class="skill-category" id="skillCategory"></p>
            </div>
        </header>

        <div id="contentArea">
            <div class="loading">加载技能详情</div>
        </div>
    </div>

    <div class="action-bar">
        <button class="btn btn-secondary" onclick="editSkill()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
            </svg>
            编辑
        </button>
        <button class="btn btn-primary" onclick="executeSkill()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polygon points="5 3 19 12 5 21 5 3"/>
            </svg>
            执行
        </button>
    </div>

    <script>
        let currentSkill = null;

        // 初始化页面
        function initPage() {
            const params = new URLSearchParams(window.location.search);
            const skillId = params.get('id');
            
            if (!skillId) {
                showError('缺少技能ID');
                return;
            }

            loadSkillDetail(skillId);
        }

        // 加载技能详情
        async function loadSkillDetail(skillId) {
            try {
                if (typeof AndroidBridge !== 'undefined' && AndroidBridge.getSkillDetail) {
                    const result = await AndroidBridge.getSkillDetail(skillId);
                    if (result) {
                        currentSkill = JSON.parse(result);
                        renderSkillDetail(currentSkill);
                    } else {
                        showError('技能不存在');
                    }
                } else {
                    // 模拟数据用于测试
                    currentSkill = getMockSkill(skillId);
                    renderSkillDetail(currentSkill);
                }
            } catch (error) {
                console.error('加载技能详情失败:', error);
                showError('加载失败: ' + error.message);
            }
        }

        // 渲染技能详情
        function renderSkillDetail(skill) {
            document.getElementById('skillName').textContent = skill.name || '未知技能';
            document.getElementById('skillCategory').textContent = skill.category || '未分类';

            const content = document.getElementById('contentArea');
            content.innerHTML = `
                <div class="glass-card">
                    <h3 class="section-title">技能描述</h3>
                    <p class="description">${skill.description || '暂无描述'}</p>
                </div>

                <div class="glass-card">
                    <h3 class="section-title">功能标签</h3>
                    <div class="tags">
                        ${renderTags(skill.tags)}
                    </div>
                </div>

                <div class="glass-card">
                    <h3 class="section-title">输入参数</h3>
                    <div class="param-list">
                        ${renderParams(skill.parameters)}
                    </div>
                </div>

                <div class="glass-card">
                    <h3 class="section-title">使用统计</h3>
                    <div class="stats-grid">
                        <div class="stat-item">
                            <div class="stat-value">${skill.usageCount || 0}</div>
                            <div class="stat-label">使用次数</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value">${skill.successRate || 0}%</div>
                            <div class="stat-label">成功率</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value">${formatDuration(skill.avgDuration)}</div>
                            <div class="stat-label">平均耗时</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value">${formatDate(skill.lastUsed)}</div>
                            <div class="stat-label">最近使用</div>
                        </div>
                    </div>
                </div>

                <div class="glass-card">
                    <h3 class="section-title">使用历史</h3>
                    <div class="usage-history scrollbar">
                        ${renderUsageHistory(skill.usageHistory)}
                    </div>
                </div>
            `;
        }

        // 渲染标签
        function renderTags(tags) {
            if (!tags || tags.length === 0) {
                return '<span class="tag">无标签</span>';
            }
            
            const tagColors = ['cyan', 'pink', 'amber', 'green'];
            return tags.map((tag, index) => 
                `<span class="tag ${tagColors[index % tagColors.length]}">${tag}</span>`
            ).join('');
        }

        // 渲染参数列表
        function renderParams(params) {
            if (!params || params.length === 0) {
                return '<div class="empty-state"><div class="empty-icon">📝</div>暂无参数</div>';
            }

            return params.map(param => `
                <div class="param-item">
                    <div>
                        <span class="param-name">${param.name}</span>
                        ${param.required ? '<span class="param-required">必填</span>' : '<span class="param-type">可选</span>'}
                        <p class="param-desc">${param.description || '无描述'}</p>
                    </div>
                    <span class="param-type">${param.type || 'string'}</span>
                </div>
            `).join('');
        }

        // 渲染使用历史
        function renderUsageHistory(history) {
            if (!history || history.length === 0) {
                return '<div class="empty-state"><div class="empty-icon">📊</div>暂无使用记录</div>';
            }

            return history.slice(0, 10).map(item => `
                <div class="usage-item">
                    <div>
                        <div style="font-weight: 500; margin-bottom: 4px;">${item.task || '任务'}</div>
                        <div class="usage-time">${formatDateTime(item.timestamp)}</div>
                    </div>
                    <span class="usage-status ${item.success ? 'success' : 'failed'}">
                        ${item.success ? '成功' : '失败'}
                    </span>
                </div>
            `).join('');
        }

        // 格式化时长
        function formatDuration(ms) {
            if (!ms) return '0s';
            if (ms < 1000) return `${ms}ms`;
            if (ms < 60000) return `${(ms / 1000).toFixed(1)}s`;
            return `${Math.floor(ms / 60000)}m`;
        }

        // 格式化日期
        function formatDate(timestamp) {
            if (!timestamp) return '从未';
            const date = new Date(timestamp);
            const now = new Date();
            const diff = now - date;
            
            if (diff < 60000) return '刚刚';
            if (diff < 3600000) return `${Math.floor(diff / 60000)}分钟前`;
            if (diff < 86400000) return `${Math.floor(diff / 3600000)}小时前`;
            return date.toLocaleDateString('zh-CN');
        }

        // 格式化完整日期时间
        function formatDateTime(timestamp) {
            if (!timestamp) return '未知';
            return new Date(timestamp).toLocaleString('zh-CN', {
                month: 'short',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        // 显示错误
        function showError(message) {
            document.getElementById('contentArea').innerHTML = `
                <div class="glass-card">
                    <div class="empty-state">
                        <div class="empty-icon">⚠️</div>
                        <p>${message}</p>
                    </div>
                </div>
            `;
        }

        // 返回
        function goBack() {
            if (typeof AndroidBridge !== 'undefined' && AndroidBridge.goBack) {
                AndroidBridge.goBack();
            } else {
                window.history.back();
            }
        }

        // 编辑技能
        function editSkill() {
            if (!currentSkill) return;
            if (typeof AndroidBridge !== 'undefined' && AndroidBridge.editSkill) {
                AndroidBridge.editSkill(currentSkill.id);
            } else {
                alert('编辑功能: ' + currentSkill.name);
            }
        }

        // 执行技能
        function executeSkill() {
            if (!currentSkill) return;
            if (typeof AndroidBridge !== 'undefined' && AndroidBridge.executeSkill) {
                AndroidBridge.executeSkill(currentSkill.id);
            } else {
                alert('执行技能: ' + currentSkill.name);
            }
        }

        // 模拟数据
        function getMockSkill(id) {
            return {
                id: id,
                name: '代码生成器',
                category: '开发工具',
                description: '根据自然语言描述自动生成高质量代码。支持多种编程语言，包括 Python、JavaScript、Java、Kotlin 等。采用先进的代码生成模型，确保生成的代码符合最佳实践。',
                tags: ['代码生成', '自动化', '多语言', 'AI辅助'],
                parameters: [
                    { name: 'language', type: 'string', required: true, description: '目标编程语言' },
                    { name: 'description', type: 'string', required: true, description: '代码功能描述' },
                    { name: 'framework', type: 'string', required: false, description: '使用的框架（如有）' }
                ],
                usageCount: 156,
                successRate: 94,
                avgDuration: 3200,
                lastUsed: Date.now() - 3600000,
                usageHistory: [
                    { task: '生成RESTful API', timestamp: Date.now() - 3600000, success: true },
                    { task: '数据库连接代码', timestamp: Date.now() - 7200000, success: true },
                    { task: '前端组件', timestamp: Date.now() - 86400000, success: false },
                    { task: '算法实现', timestamp: Date.now() - 172800000, success: true }
                ]
            };
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', initPage);
    </script>
</body>
</html>
