# ============================================================
# Apex AI Agent · APK 构建与发布流水线
# ------------------------------------------------------------
# 触发条件：
#   1. 推送 v* 格式的 tag（如 v1.0.0）→ 自动构建 + 发布 Release
#   2. 手动触发（workflow_dispatch）→ 可选构建 debug/release
#
# 产物：9 个 APK（主 App + 8 个套件 APK）
# ============================================================
name: Build & Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      build_type:
        description: '构建类型'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug
          - both

env:
  JAVA_VERSION: '17'
  GRADLE_OPTS: '-Dorg.gradle.daemon=false -Dorg.gradle.caching=true -Dorg.gradle.parallel=true -Xmx4g'

jobs:
  build:
    name: Build APKs
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK components
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;34.0.0" \
            "cmake;3.22.1" \
            "ndk;26.3.11579264" || true
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> $GITHUB_ENV
          echo "SDK components installed"
          sdkmanager --list_installed 2>/dev/null || true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            .gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', 'gradle/libs.versions.toml') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Decode signing keystore
        env:
          SIGNING_KEYSTORE: ${{ secrets.SIGNING_KEYSTORE }}
        run: |
          if [ -z "$SIGNING_KEYSTORE" ]; then
            echo "No signing keystore provided, will use debug signing"
            exit 0
          fi
          mkdir -p $HOME/keystore
          echo "$SIGNING_KEYSTORE" | base64 -d > $HOME/keystore/apex-release.jks
          echo "Keystore decoded successfully"
          ls -la $HOME/keystore/apex-release.jks

      - name: Create local.properties
        env:
          RELEASE_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          echo "sdk.dir=${ANDROID_HOME}" > local.properties
          if [ -f "$HOME/keystore/apex-release.jks" ]; then
            echo "RELEASE_STORE_FILE=$HOME/keystore/apex-release.jks" >> local.properties
            echo "RELEASE_STORE_PASSWORD=$RELEASE_STORE_PASSWORD" >> local.properties
            echo "RELEASE_KEY_ALIAS=$RELEASE_KEY_ALIAS" >> local.properties
            echo "RELEASE_KEY_PASSWORD=$RELEASE_KEY_PASSWORD" >> local.properties
            echo "Release signing configured"
            echo "APEX_RELEASE_STORE_FILE=$HOME/keystore/apex-release.jks" >> $GITHUB_ENV
            echo "APEX_RELEASE_STORE_PASSWORD=$RELEASE_STORE_PASSWORD" >> $GITHUB_ENV
            echo "APEX_KEY_ALIAS=$RELEASE_KEY_ALIAS" >> $GITHUB_ENV
            echo "APEX_KEY_PASSWORD=$RELEASE_KEY_PASSWORD" >> $GITHUB_ENV
          else
            echo "No signing keystore found, building with debug signing"
          fi

      - name: Fix gradle.properties for CI (remove hardcoded Windows paths)
        run: |
          sed -i 's|-Djava.io.tmpdir=C:/Users/18119/AppData/Local/Temp|-Djava.io.tmpdir=/tmp|g' gradle.properties
          sed -i 's|-Dobjectbox.properties=C:/Users/18119/Desktop/android-agent/.objectbox-build.properties||g' gradle.properties
          echo "Fixed gradle.properties for Linux CI"
          grep "java.io.tmpdir" gradle.properties

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Determine build type
        id: buildtype
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "build_type=release" >> $GITHUB_OUTPUT
            echo "tag_name=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "build_type=${{ github.event.inputs.build_type }}" >> $GITHUB_OUTPUT
            echo "tag_name=dev-$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT
          fi

      - name: Build Release APKs
        id: build_release
        if: steps.buildtype.outputs.build_type == 'release' || steps.buildtype.outputs.build_type == 'both'
        continue-on-error: true
        run: ./gradlew assembleRelease --no-daemon --continue -x lint 2>&1

      - name: Check build results
        if: always() && (steps.buildtype.outputs.build_type == 'release' || steps.buildtype.outputs.build_type == 'both')
        run: |
          SUCCESS=""
          FAILED=""
          # Find all built APKs
          echo "=== All APK files found ==="
          find . -path "*/build/outputs/apk/release/*.apk" 2>/dev/null | sort
          echo "=== Checking each target ==="
          for dir in apk/engine apk/rage apk/multi-agent apk/workflow apk/market apk/working-files apk/voice app apk/terminal; do
            target=$(echo "$dir" | tr '/' ':')
            target=":$target"
            apk=$(find "$dir/build/outputs/apk/release" -name "*.apk" 2>/dev/null | head -1)
            if [ -n "$apk" ]; then
              echo "✅ Found: $target -> $apk"
              SUCCESS="$SUCCESS $target"
            else
              echo "❌ Missing: $target"
              FAILED="$FAILED $target"
            fi
          done
          echo "✅ Successfully built:$SUCCESS"
          if [ -n "$FAILED" ]; then
            echo "⚠️ Failed to build:$FAILED"
          fi
          if [ -z "$SUCCESS" ]; then
            echo "❌ No APKs built successfully"
            exit 1
          fi

      - name: Build Debug APKs
        id: build_debug
        if: steps.buildtype.outputs.build_type == 'debug' || steps.buildtype.outputs.build_type == 'both'
        continue-on-error: true
        run: ./gradlew assembleDebug --no-daemon --continue -x lint 2>&1

      - name: Collect APKs
        id: collect
        run: |
          mkdir -p artifacts
          BUILD_TYPE="${{ steps.buildtype.outputs.build_type }}"
          if [ "$BUILD_TYPE" = "both" ]; then
            TYPES="release debug"
          else
            TYPES="$BUILD_TYPE"
          fi

          echo "### Built APKs" > apk-list.md
          echo "" >> apk-list.md
          echo "| APK | Size | Type |" >> apk-list.md
          echo "|-----|------|------|" >> apk-list.md

          COUNT=0
          for TYPE in $TYPES; do
            find . -path "*/build/outputs/apk/${TYPE}/*.apk" | sort | while read apk; do
              BASENAME=$(basename "$apk" .apk)
              if echo "$BASENAME" | grep -q "^app-"; then
                OUT_NAME="main-app-${TYPE}.apk"
              else
                OUT_NAME="${BASENAME}.apk"
              fi
              cp "$apk" "artifacts/$OUT_NAME"
              SIZE=$(du -h "artifacts/$OUT_NAME" | cut -f1)
              echo "| $OUT_NAME | $SIZE | $TYPE |" >> apk-list.md
              COUNT=$((COUNT + 1))
            done
          done

          echo "apk_count=$COUNT" >> $GITHUB_OUTPUT
          echo "Collected APKs:"
          ls -lh artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: apex-apks-${{ steps.buildtype.outputs.tag_name }}
          path: artifacts/*.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.buildtype.outputs.tag_name }}
          name: "Apex AI Agent ${{ steps.buildtype.outputs.tag_name }}"
          body_path: apk-list.md
          draft: false
          prerelease: ${{ github.event_name == 'workflow_dispatch' }}
          files: artifacts/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup keystore
        if: always()
        run: rm -rf $HOME/keystore
